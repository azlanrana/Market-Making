# =============================================================================
# Dynamic conditional-touch trigger sweep for ETH_USD
# =============================================================================
# Goal: validate the ETH_USD version of the same controller that now anchors
# BTC_USD: keep the base conditional-touch filter fixed, and sweep only the
# EWMA hysteresis trigger band.
#
# IMPORTANT: `REBATE_MM_PROFILE=eth` would cause the loader to use
# `rebate_mm_eth.yaml` instead of this file. For this sweep, unset it.
#
# Run from `mm/`:
#   unset REBATE_MM_PROFILE && \
#   SWEEP_CONFIG=configs/sweep_dynamic_conditional_touch_eth.yaml \
#   S3_BUCKET=l2ethusd S3_PREFIX=2025/2025/01/ TRADING_PAIR=ETH_USD AWS_REGION=us-east-1 \
#   MAX_CONCURRENT_DOWNLOADS=32 SWEEP_OUTPUT_CSV=sweep_jan_2025_ethusd_dynamic_conditional_touch.csv \
#   cargo test -p mm-engine backtest_s3_sweep --release -- --ignored --nocapture
# =============================================================================

base:
  order_amount: 2.0

  base_spread: 4.0
  vol_lookback: 50
  vol_threshold_bps: 2.0
  max_spread_multiplier: 4.0

  inventory_limit: 4.0
  hedge_limit: 4.0
  inventory_skew_k: 0.25

  book_imbalance_threshold: 0.80
  book_imbalance_levels: 3

  microprice_impulse_lookback: 4
  microprice_impulse_threshold_bps: 1.0
  microprice_impulse_pause_sec: 1.0
  microprice_edge_threshold_bps: 0.0
  microprice_edge_size_scale_enabled: true
  microprice_edge_scale_k_bps: 0.02
  microprice_edge_scale_min_mult: 0.3
  microprice_edge_scale_max_mult: 1.0
  microprice_edge_tape_regime_enabled: false
  microprice_edge_tape_spread_ewma_alpha: 0.02
  microprice_edge_tape_relax_low_spread_bps: -0.02
  microprice_edge_tape_relax_high_spread_bps: 0.08
  microprice_edge_tape_min_fills: 50
  microprice_edge_tape_upside_enabled: false
  microprice_edge_tape_upside_use_regime_band: true
  microprice_edge_tape_upside_max_mult: 1.15
  microprice_edge_tape_upside_low_spread_bps: 0.10
  microprice_edge_tape_upside_high_spread_bps: 0.20
  microprice_edge_tape_upside_min_fills: 50

  impulse_phase1_sizing: true
  impulse_phase1_calm: 1.2
  impulse_phase1_mid: 0.8
  impulse_phase1_min: 0.6

  impulse_kill_threshold_bps: 1.0
  impulse_kill_asymmetric: true
  impulse_kill_hybrid_extreme_bps: null

  impulse_size_skew_enabled: false
  impulse_skew_favored: 1.15
  impulse_skew_lean: 0.75

  directional_skew_enabled: false
  directional_signal_threshold_ticks: 0.15
  directional_suppress_threshold_ticks: 1.0
  directional_widen_ticks: 1

  microprice_drift_enabled: false
  microprice_drift_lookback: 10
  microprice_drift_threshold_bps: 2.0

  microprice_fade_enabled: false
  microprice_fade_min_edge_bps: 0.02
  microprice_fade_ticks: 1
  microprice_fade_impulse_min_bps: 0.0
  microprice_fade_impulse_bucketed: false
  microprice_fade_bucket_impulse_lo_bps: 0.3
  microprice_fade_bucket_impulse_hi_bps: 0.8
  microprice_fade_bucket_max_ticks: 2

  dynamic_spread_enabled: true

  queue_join_touch_enabled: true
  conditional_touch_join_enabled: true
  conditional_touch_max_impulse_bps: 0.4
  conditional_touch_max_edge_bps: 0.012
  dynamic_conditional_touch_enabled: true
  dynamic_conditional_touch_ewma_alpha: 0.02
  dynamic_conditional_touch_min_fills: 50
  dynamic_conditional_touch_enter_bps: -0.25
  dynamic_conditional_touch_exit_bps: -0.20
  fill_touch_brake_enabled: false
  fill_touch_brake_bad_spread_bps: -0.5
  fill_touch_brake_sec: 0.2
  wide_spread_max_bps: 6.0
  asymmetric_passive_depth: true
  queue_join_safe_side_threshold_bps: 0.45
  queue_join_safe_side_max_touch_qty: 120.0
  state_passive_max_depth_ticks: 2
  passive_depth_spread_capture_bias: true

  quote_stickiness_min_hold_sec: 0.25
  quote_stickiness_hysteresis_ticks: 1
  quote_stickiness_depth_min_delta_ticks: 2

  order_refresh_sec: 0.75
  warmup_sec: 30.0

  mid_regime_spread_penalty_enabled: true
  mid_impulse_lo: 0.6
  mid_impulse_hi: 0.9
  tight_spread_bps: 2.5
  mid_regime_size_mult: 0.8

  dynamic_order_sizing: true
  dynamic_order_min: 0.4
  dynamic_order_max: 3.0

grid:
  dynamic_conditional_touch_enter_bps: [-0.25, -0.30, -0.35]
  dynamic_conditional_touch_exit_bps: [-0.10, -0.15, -0.20]
